<!DOCTYPE html>
<html>
<head>
  <style>
    /* Adjacent sibling selector */
    h1 + p {
      color: blue;
    }
  </style>
</head>
<body>

  <h1>Heading</h1>
  <p>This paragraph is immediately after h1 → will be blue</p>

  <p>This paragraph is NOT immediately after h1 → will NOT be blue</p>

</body>
</html>
